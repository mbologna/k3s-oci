---
# Grafana HTTPRoute via Envoy Gateway
#
# Grafana admin credentials: terraform output -raw grafana_admin_credentials
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: https-grafana
  hostnames:
    - "grafana.129.146.2.130.sslip.io"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  # TLS secret lives in the Gateway namespace so no ReferenceGrant is needed.
  namespace: envoy-gateway-system
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "grafana.129.146.2.130.sslip.io"
