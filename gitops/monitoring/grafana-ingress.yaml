---
# Grafana HTTPRoute via Envoy Gateway
#
# The hostname and the TLS Certificate are created by cloud-init using the
# GRAFANA_HOSTNAME variable (derived from the NLB IP or var.grafana_hostname).
# This file intentionally omits the hostname so it is IP-independent.
# cloud-init applies the correct hostname-specific HTTPRoute and Certificate
# after ArgoCD has deployed the Gateway. ArgoCD monitoring-extras ignores
# differences in the hostnames field so GitOps reconciliation is stable.
#
# Grafana admin credentials: terraform output -raw grafana_admin_credentials
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: https-grafana
  # hostname set by cloud-init configure_grafana_ingress() -- not committed here
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
