---
# ServiceMonitor for Longhorn — tells Prometheus to scrape Longhorn metrics on port 9500.
# Longhorn exposes metrics from longhorn-manager pods.
# Requires kube-prometheus-stack to be deployed with serviceMonitorSelectorNilUsesHelmValues=false
# (already set in gitops/apps/kube-prometheus-stack.yaml via release label selector).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: longhorn-prometheus-servicemonitor
  namespace: monitoring
  labels:
    # Must match kube-prometheus-stack's serviceMonitorSelector (release label)
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: longhorn-manager
  namespaceSelector:
    matchNames:
      - longhorn-system
  endpoints:
    - port: manager
      path: /metrics
      interval: 30s
