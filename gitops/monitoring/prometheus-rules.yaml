---
# PrometheusRule: alerts for node disk pressure, Longhorn health, etcd quorum,
# node readiness, API server latency, and certificate expiry.
# Managed by ArgoCD via monitoring-extras Application.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k3s-oci-alerts
  namespace: monitoring
  labels:
    # kube-prometheus-stack selects rules by this label
    release: kube-prometheus-stack
spec:
  groups:
    - name: node.disk
      interval: 1m
      rules:
        - alert: NodeDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} is under disk pressure"
            description: "Node {{ $labels.node }} has been under disk pressure for more than 2 minutes. Free up space or expand the boot volume."
        # NodeDiskSpaceLow and NodeDiskSpaceCritical have been consolidated into
        # NodeDiskUsageHigh and NodeDiskUsageCritical in the node.filesystem group below.

    - name: longhorn.volume
      interval: 1m
      rules:
        - alert: LonghornNodeStorageWarning
          expr: |
            (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} storage usage above 80%"
            description: "Longhorn node {{ $labels.node }} is using {{ $value | humanize }}% of its storage capacity."

    - name: node.availability
      interval: 1m
      rules:
        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not Ready"
            description: "Node {{ $labels.node }} has been in NotReady state for more than 5 minutes. This may indicate a kubelet crash, OOM, or etcd quorum loss."

        - alert: NodeMemoryPressure
          expr: |
            kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} is under memory pressure"
            description: "Node {{ $labels.node }} is under memory pressure. Pods may be evicted. Check for OOM candidates with: kubectl describe node {{ $labels.node }}"

    - name: apiserver.latency
      interval: 1m
      rules:
        - alert: APIServerHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(apiserver_request_duration_seconds_bucket{
                verb!~"WATCH|CONNECT",
                subresource!="log"
              }[5m])) by (le, verb, resource)
            ) > 4
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "API server p99 latency high for {{ $labels.verb }} {{ $labels.resource }}"
            description: >
              API server 99th-percentile latency for {{ $labels.verb }} {{ $labels.resource }}
              exceeds 4s for 10 minutes. Possible etcd pressure or node resource exhaustion.

    - name: certificates
      interval: 1m
      rules:
        - alert: CertManagerCertificateExpiringSoon
          expr: |
            certmanager_certificate_expiration_timestamp_seconds - time() < 604800
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "cert-manager certificate {{ $labels.name }} expires in less than 7 days"
            description: >
              Certificate {{ $labels.namespace }}/{{ $labels.name }} will expire in
              {{ $value | humanizeDuration }}. cert-manager should auto-renew;
              check cert-manager logs if this persists.

        - alert: CertManagerCertificateExpiredOrMissing
          expr: |
            certmanager_certificate_ready_status{condition="False"} == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "cert-manager certificate {{ $labels.name }} is not Ready"
            description: >
              Certificate {{ $labels.namespace }}/{{ $labels.name }} has condition Ready=False
              for 10 minutes. TLS may be broken.
              Check: kubectl describe certificate -n {{ $labels.namespace }} {{ $labels.name }}

    - name: node.filesystem
      interval: 1m
      rules:
        - alert: NodeDiskUsageHigh
          expr: |
            node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"} /
            node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"} < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk usage above 85%"
            description: >
              Node {{ $labels.instance }} has less than 15% free space on /
              ({{ $value | humanizePercentage }} remaining).
              Longhorn replicas and container images compete for the same 50 GB boot volume.
              Consider pruning unused images or reducing Longhorn replica data.

        - alert: NodeDiskUsageCritical
          expr: |
            node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"} /
            node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"} < 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} disk critically full (<5% free)"
            description: >
              Node {{ $labels.instance }} has less than 5% free space on /
              ({{ $value | humanizePercentage }} remaining).
              Immediate action required — kubelet may evict pods and k3s may fail.
              Run: kubectl describe node {{ $labels.instance }} to check disk pressure condition.

    - name: etcd.backup
      rules:
        - alert: EtcdSnapshotMissing
          expr: absent(etcd_snapshot_last_success_timestamp_seconds)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "No etcd snapshot metric on any k3s server"
            description: >
              etcd_snapshot_last_success_timestamp_seconds is absent from all servers —
              no snapshot upload has ever been recorded. EtcdSnapshotStale cannot fire
              without this series, so this is the only signal that snapshots are broken
              from the start. Check IAM (manage objects in the bucket), the bucket name,
              and /var/log/etcd-snapshot-upload.log on each control-plane node.

        - alert: EtcdSnapshotStale
          expr: |
            (time() - etcd_snapshot_last_success_timestamp_seconds) > 25200
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "etcd snapshot on {{ $labels.instance }} is stale (>7h)"
            description: >
              No successful etcd snapshot upload has completed on {{ $labels.instance }}
              in the last 7 hours. Check /var/log/etcd-snapshot-upload.log on the node.
              The cron runs every 6h; a gap >7h indicates the cron or OCI CLI is broken.
              Without fresh snapshots, cluster recovery from split-brain or quorum loss
              is not possible.

    - name: longhorn.backup
      rules:
        - alert: LonghornBackupFailed
          expr: |
            longhorn_backup_state{state="Error"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn backup {{ $labels.backup_name }} in error state"
            description: >
              Longhorn backup {{ $labels.backup_name }} (volume {{ $labels.volume_name }})
              is in Error state. PVC data may not be protected.
              Check: kubectl -n longhorn-system get backups.longhorn.io

        - alert: LonghornVolumeRobustnessUnhealthy
          expr: |
            longhorn_volume_robustness == 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is degraded"
            description: >
              Longhorn volume {{ $labels.volume }} has robustness=Degraded (robustness==2).
              With defaultReplicaCount=2 and one degraded replica, a second node loss risks
              data loss. Check: kubectl -n longhorn-system describe volume {{ $labels.volume }}

        - alert: LonghornVolumeRobustnessFaulted
          expr: |
            longhorn_volume_robustness == 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is faulted"
            description: >
              Longhorn volume {{ $labels.volume }} has robustness=Faulted (all replicas lost).
              Data may be unrecoverable. Immediate action required.
              Check: kubectl -n longhorn-system describe volume {{ $labels.volume }}
