apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Remote SUC manifests — version appears in both URLs below.
# Renovate updates both URLs atomically when a new release is published.
# renovate: datasource=github-releases depName=rancher/system-upgrade-controller
# SUC_VERSION=v0.19.2
resources:
  - https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/crd.yaml
  - https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/system-upgrade-controller.yaml
  - plans.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: system-upgrade-controller
        namespace: system-upgrade
      spec:
        template:
          spec:
            containers:
              - name: system-upgrade-controller
                env:
                  - name: SYSTEM_UPGRADE_JOB_ACTIVE_DEADLINE_SECONDS
                    value: "1800"
