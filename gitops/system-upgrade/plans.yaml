---
# k3s upgrade Plans managed by system-upgrade-controller.
# Edit 'channel' below to switch between "stable", "latest", or "testing".
# "stable" is the default; override in your fork if you need a different channel.
#
# ⚠️  CHANNEL DRIFT NOTE: channel: stable tracks the k3s stable release stream
# independently of var.k3s_version in terraform.tfvars. After a fresh deploy, SUC
# will upgrade the cluster beyond the Terraform-pinned version on the next upgrade
# cycle. This is intentional — the pin in vars.tf only controls the initial install;
# ongoing upgrades are delegated to SUC. If you need to lock the cluster at the
# initial version, set 'version' below (and remove 'channel'):
#   version: v1.31.4+k3s1   # renovate: datasource=github-releases depName=k3s-io/k3s
#   channel: ""
#
# Pin a specific version by setting the 'version' field below (and setting
# channel to "" or removing it). Renovate will open PRs to bump the version
# automatically using the regex manager configured in renovate.json.
# Example:
#   version: v1.31.4+k3s1   # renovate: datasource=github-releases depName=k3s-io/k3s
#   channel: ""
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  namespace: system-upgrade
spec:
  concurrency: 1
  channel: https://update.k3s.io/v1-release/channels/stable
  # version: v1.31.4+k3s1  # renovate: datasource=github-releases depName=k3s-io/k3s
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: "true"
  serviceAccountName: system-upgrade
  cordon: true
  drain:
    # disableEviction was removed to respect PodDisruptionBudgets during upgrades.
    # NOTE: longhorn-manager is a DaemonSet — drain with --ignore-daemonsets never
    # evicts it, so its PDB (minAvailable:2) is NOT what enforces serialization here.
    # Actual one-at-a-time guarantees come from:
    #   1. concurrency: 1 in this Plan (SUC only drains one node at a time)
    #   2. kured distributed lock (prevents concurrent reboots)
    #   3. Longhorn instance-manager auto-generated PDBs (block drain while replica
    #      rebuild is in progress — these cover actual data-path pods, not DaemonSets)
    skipWaitForDeleteTimeout: 60
  upgrade:
    image: rancher/k3s-upgrade
---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent
  namespace: system-upgrade
spec:
  concurrency: 1
  channel: https://update.k3s.io/v1-release/channels/stable
  # version: v1.31.4+k3s1  # renovate: datasource=github-releases depName=k3s-io/k3s
  nodeSelector:
    matchExpressions:
      - {key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}
  serviceAccountName: system-upgrade
  cordon: true
  drain:
    # disableEviction removed: same reasoning as server plan — respect PDBs.
    # Serialization for worker node upgrades comes from concurrency:1 and the
    # kured distributed lock; Longhorn instance-manager PDBs block drain while
    # any replica rebuild is pending.
    skipWaitForDeleteTimeout: 60
  prepare:
    image: rancher/k3s-upgrade
    args: ["prepare", "k3s-server"]
  upgrade:
    image: rancher/k3s-upgrade
