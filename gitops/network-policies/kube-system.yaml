---
# Default-deny for kube-system. System components (coredns, kured, metrics-server)
# are allowed by the targeted policies below.
# This is the only namespace that previously lacked default-deny coverage.
# NOTE: argocd-image-updater deploys to the 'argocd' namespace, not kube-system.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kube-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# CoreDNS: accept DNS queries from all pods, respond to cluster IPs.
# Also accepts Prometheus scrape on :9153 from monitoring namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-coredns
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: kube-dns
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9153
          protocol: TCP
  egress:
    - {}  # CoreDNS needs to forward to upstream resolvers
---
# metrics-server: k3s bundles metrics-server with label k8s-app:metrics-server
# (not app.kubernetes.io/name). It serves on --secure-port=10250 (the k3s default).
# Egress needs 6443 (apiserver endpoint post-DNAT) in addition to 10250 (kubelets)
# and 443/53 for fallback resolution.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-server
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: metrics-server   # k3s-bundled label (was app.kubernetes.io/name: metrics-server)
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 10250             # serving port (was 4443 — incorrect)
          protocol: TCP
  egress:
    - ports:
        - port: 6443              # apiserver endpoint (post-DNAT) — was missing
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 10250             # kubelet metrics scrape
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# kured: needs apiserver to acquire/release lock and to drain nodes.
# kubereboot Helm chart 6.0.0 labels pods with app.kubernetes.io/name:kured
# (was name:kured — the legacy weaveworks label, no longer set by the chart).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kured
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kured   # was name: kured (legacy label, chart 6.0.0 dropped it)
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# local-path-provisioner: needs apiserver access to manage PVCs and watch resources.
# Without this, local-path-provisioner crashloops under the kube-system default-deny.
# local-path is not the default StorageClass (Longhorn is), but it ships with k3s and
# must be able to communicate with the apiserver.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-local-path-provisioner
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app: local-path-provisioner
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
