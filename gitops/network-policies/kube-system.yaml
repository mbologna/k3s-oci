---
# Default-deny for kube-system. System components (coredns, kured, metrics-server,
# argocd-image-updater) are allowed by the targeted policies below.
# This is the only namespace that previously lacked default-deny coverage.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kube-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# CoreDNS: accept DNS queries from all pods, respond to cluster IPs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-coredns
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: kube-dns
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  egress:
    - {}  # CoreDNS needs to forward to upstream resolvers
---
# metrics-server: accept scrape from apiserver, expose :4443 for kubectl top.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-server
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: metrics-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 4443
          protocol: TCP
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 10250
          protocol: TCP
---
# kured: needs apiserver to acquire/release lock and to drain nodes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kured
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      name: kured
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# argocd-image-updater: needs to reach container registries and the ArgoCD API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-image-updater
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-image-updater
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
