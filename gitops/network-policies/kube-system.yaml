---
# Default-deny for kube-system. System components (coredns, kured, metrics-server)
# are allowed by the targeted policies below.
# This is the only namespace that previously lacked default-deny coverage.
# NOTE: argocd-image-updater deploys to the 'argocd' namespace, not kube-system.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kube-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# CoreDNS: accept DNS queries from all pods, respond to cluster IPs.
# Also accepts Prometheus scrape on :9153 from monitoring namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-coredns
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: kube-dns
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9153
          protocol: TCP
  egress:
    - {}  # CoreDNS needs to forward to upstream resolvers
---
# metrics-server: accept scrape from apiserver, expose :4443 for kubectl top.
# Egress includes port 53 for DNS resolution (in case kubelet/apiserver hostnames
# are used by future chart versions instead of direct IPs).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-server
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: metrics-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 4443
          protocol: TCP
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 10250
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# kured: needs apiserver to acquire/release lock and to drain nodes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kured
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      name: kured
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# local-path-provisioner: needs apiserver access to manage PVCs and watch resources.
# Without this, local-path-provisioner crashloops under the kube-system default-deny.
# local-path is not the default StorageClass (Longhorn is), but it ships with k3s and
# must be able to communicate with the apiserver.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-local-path-provisioner
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app: local-path-provisioner
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
