---
# Default-deny for the envoy-gateway-system namespace.
# Envoy proxy pods receive direct internet traffic via the OCI NLB (NodePort)
# and must only allow the specific ports they serve.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow Envoy proxy pods to receive HTTP/HTTPS traffic from the NLB.
# IMPORTANT: NetworkPolicy ports match destination port at the pod (post-DNAT).
# Envoy Gateway remaps listener ports <1024 by +10000 at the container level:
#   Service port 80 → container port 10080 (nodePort 30080)
#   Service port 443 → container port 10443 (nodePort 30443)
# kube-router evaluates policies post-DNAT on the pod veth, so nodePort numbers
# (30080/30443) never match — the container ports (10080/10443) must be used.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nodeport-ingress
  namespace: envoy-gateway-system
spec:
  podSelector:
    matchLabels:
      gateway.envoyproxy.io/owning-gateway-name: eg
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 10080
        - protocol: TCP
          port: 10443
---
# Allow intra-namespace traffic: Envoy proxy DaemonSet pods connect to the Envoy Gateway
# controller on port 18000 (xDS gRPC) for all configuration (listeners, routes, clusters,
# TLS secrets via SDS). Without this policy, default-deny blocks that channel and Envoy
# never loads any config — all HTTP/HTTPS ingress is silently dead.
# This policy also covers cert-manager HTTP-01 ACME solver pods (port 8089) that
# configure_app_ingress() creates in this namespace (Certificate in envoy-gateway-system).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Allow Envoy Gateway control-plane and proxy pods to reach the Kubernetes API (kubeapi).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubeapi-egress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
---
# Allow Envoy Gateway to reach upstream backends (pods in other namespaces via ClusterIP).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000
        # cert-manager HTTP-01 ACME solver pods (cross-namespace, i.e. solver in app namespace)
        - protocol: TCP
          port: 8089
---
# Allow DNS resolution for all pods in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
