---
# Default-deny for the external-secrets namespace.
# Applied when enable_external_secrets = true.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow all traffic within the external-secrets namespace
# (operator <-> webhook <-> cert-controller coordination).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Allow External Secrets Operator to reach OCI Vault (HTTPS) and the Kubernetes API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# Allow the Kubernetes API server to reach the ESO webhook.
# ESO webhook serves on port 10250 (chart default: webhook.port=10250, hostNetwork:false).
# The pod is NOT host-networked, so there is no conflict with kubelet's 10250.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-from-apiserver
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 10250   # ESO webhook.port default (was 9443 — incorrect)
          protocol: TCP
---
# Allow DNS resolution for all pods in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-imds-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # OCI IMDS (Instance Metadata Service) at 169.254.169.254:80 (HTTP only, port 80).
    # Required for instance-principal authentication used by the OCI Vault ClusterSecretStore.
    # The SDK reads the leaf cert/key and region from the IMDS before signing API requests.
    # Without this rule, ClusterSecretStore stays NotReady and all ExternalSecrets fail.
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - port: 80
          protocol: TCP
---
# Allow DNS resolution for all pods in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
