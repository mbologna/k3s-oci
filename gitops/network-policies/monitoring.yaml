---
# Default-deny ingress for the monitoring namespace.
# Prometheus scrapes pods in other namespaces (egress from this namespace) — that's not affected.
# We control what can reach Grafana, Prometheus UI, and Alertmanager.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow all traffic within the monitoring namespace (Prometheus <-> Alertmanager <-> Grafana)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Allow monitoring to scrape targets in other namespaces and reach external endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# Allow Prometheus to scrape pods in any namespace on standard metrics ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 9090
          protocol: TCP
        - port: 9091
          protocol: TCP
        - port: 9093
          protocol: TCP
        - port: 9100
          protocol: TCP
        - port: 9500
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
        - port: 8443
          protocol: TCP
        - port: 10250
          protocol: TCP
        - port: 10255
          protocol: TCP
---
# Allow Envoy Gateway to reach Grafana (HTTPRoute on port 80)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-gateway-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
---
# Allow Prometheus to scrape metrics from any namespace
# (This policy is in monitoring; the scraped pods' namespaces need corresponding egress/ingress rules)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Allow DNS egress from monitoring pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
