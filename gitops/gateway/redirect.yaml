---
# HTTP → HTTPS redirect: redirects plain HTTP to HTTPS for all configured HTTPS hostnames.
# Attached to the Gateway's `http` (port 80) listener.
#
# The `hostnames` field is intentionally omitted here — cloud-init adds the correct
# hostname (e.g. grafana.<nlb-ip>.sslip.io) via kubectl patch at bootstrap time.
# ArgoCD gateway-config has RespectIgnoreDifferences=true + ignoreDifferences on
# http-to-https-redirect /spec/hostnames so the cloud-init patch is preserved.
#
# Priority note: cert-manager HTTP-01 ACME challenges use a separate HTTPRoute
# with a more specific path match (/.well-known/acme-challenge/…) that takes
# precedence over this wildcard redirect. Switch to DNS-01
# (enable_dns01_challenge = true) to avoid any HTTP-01 conflict.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
