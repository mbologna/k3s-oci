---
# HTTP → HTTPS redirect: redirects plain HTTP to HTTPS for the listed hostnames.
# Attached to the Gateway's `http` (port 80) listener.
#
# Add each hostname to the `hostnames` list below as you configure HTTPS listeners
# in gateway.yaml and cert-manager Certificates. Without a matching hostname in
# this list, HTTP traffic for that host passes through to its HTTPRoute directly.
#
# Priority note: cert-manager HTTP-01 ACME challenges use a separate HTTPRoute
# with a more specific path match (/.well-known/acme-challenge/…) that takes
# precedence over this wildcard redirect. Switch to DNS-01
# (enable_dns01_challenge = true) to avoid any HTTP-01 conflict.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: http
  # Hostnames are added by cloud-init at bootstrap time for each configured HTTPS
  # service (e.g. grafana.<nlb-ip>.sslip.io). An empty list would match ALL
  # hostnames; a placeholder prevents redirecting unknown hosts until a listener
  # is explicitly configured.
  # cloud-init patches this list via kubectl after ArgoCD deploys it.
  # ArgoCD monitoring-extras ignoreDifferences covers the hostnames field.
  hostnames: []
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
