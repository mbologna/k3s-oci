---
# HTTP → HTTPS redirect: redirects plain HTTP to HTTPS for all configured HTTPS hostnames.
# Attached to the Gateway's `http` (port 80) listener.
#
# The `hostnames` field is intentionally OMITTED — an empty or absent hostnames list
# matches ALL hostnames (Gateway API spec). This is the correct behaviour: the redirect
# applies to every host on port 80, and cert-manager's more-specific HTTP-01 challenge
# HTTPRoute (exact path /.well-known/acme-challenge/...) takes precedence automatically.
#
# Do NOT add explicit hostnames here — that would break redirect for any host not listed.
# cloud-init does NOT patch this file at bootstrap time.
#
# SSA field ownership: cloud-init-bootstrap owns spec.hostnames on app HTTPRoutes (e.g.
# grafana-route) via kubectl apply --server-side --field-manager=cloud-init-bootstrap.
# This redirect route has no hostnames field, so there is no ownership conflict and no
# ignoreDifferences entry for it in gateway-config (despite an earlier stale comment).
#
# Priority note: cert-manager HTTP-01 ACME challenges use a separate HTTPRoute
# with a more specific path match (/.well-known/acme-challenge/…) that takes
# precedence over this wildcard redirect. Switch to DNS-01
# (enable_dns01_challenge = true) to avoid any HTTP-01 conflict.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
