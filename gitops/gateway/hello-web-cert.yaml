---
# TLS certificate for the hello-web HTTPS listener in gateway.yaml.
# cert-manager issues this via HTTP-01 (Let's Encrypt) using the Gateway
# API HTTPRoute solver. The Secret lands in envoy-gateway-system so no
# ReferenceGrant is needed.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hello-web-tls
  namespace: envoy-gateway-system
spec:
  secretName: hello-web-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "hello-web.129.146.2.130.sslip.io"
