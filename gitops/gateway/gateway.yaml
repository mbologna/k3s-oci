---
# Gateway: central entry point for all HTTP and HTTPS traffic.
# Cloud-init bootstraps this resource with per-hostname HTTPS listeners.
# The HTTP listener handles redirects (see redirect.yaml).
#
# To adopt into ArgoCD after bootstrap:
#   1. Update the HTTPS listener hostnames below to match your actual hostnames.
#   2. This file is managed by the gateway-config ArgoCD Application.
#
# TLS: cert-manager Certificate resources (one per HTTPS listener) provision
# the secrets referenced in certificateRefs. These are created by cloud-init
# alongside the inline HTTPRoutes and live in the envoy-gateway-system namespace.
#
# If you add new services with HTTPS, add a listener here and a Certificate
# in envoy-gateway-system, then create an HTTPRoute in the service namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All

    # ── HTTPS listeners — one per hostname ────────────────────────────────────
    # Hostname-specific HTTPS listeners are added by cloud-init at bootstrap time
    # using the GRAFANA_HOSTNAME variable (NLB-IP-derived sslip.io or custom domain).
    # ArgoCD gateway-config ignores differences in spec.listeners so these survive
    # GitOps reconciliation. Do NOT add hardcoded hostname entries here.
    #
    # Example listeners (managed by cloud-init, shown for reference only):
    #
    # - name: https-grafana
    #   port: 443
    #   protocol: HTTPS
    #   hostname: "grafana.<nlb-ip>.sslip.io"   # set by cloud-init
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - name: grafana-tls
    #   allowedRoutes:
    #     namespaces:
    #       from: All
    #
    # - name: https-argocd
    #   port: 443
    #   protocol: HTTPS
    #   hostname: "argocd.example.com"
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - name: argocd-server-tls
    #   allowedRoutes:
    #     namespaces:
    #       from: All
