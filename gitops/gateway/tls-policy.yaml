---
# ClientTrafficPolicy: enforce TLS 1.2+ and strong cipher suites for all
# HTTPS listeners on the eg Gateway. Envoy TLS 1.3 ciphers are selected
# automatically by the runtime and cannot be restricted here.
# Note: CHACHA20_POLY1305 ciphers are intentionally omitted — Envoy/BoringSSL
# on aarch64 rejects them, causing the entire TLS xDS push to fail and
# leaving all HTTPS listeners without certificates.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: tls-policy
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
  tls:
    minVersion: "1.2"
    ciphers:
      - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
