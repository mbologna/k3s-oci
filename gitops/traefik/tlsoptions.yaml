---
# TLSOption: enforce TLS 1.2+ and strong cipher suites across all Traefik IngressRoutes.
# Reference this in IngressRoute specs with:
#   tls:
#     options:
#       name: tls-modern
#       namespace: traefik
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: tls-modern
  namespace: traefik
spec:
  minVersion: VersionTLS12
  # TLS 1.3 cipher suites are not configurable (Go selects them automatically).
  # These cipherSuites apply to TLS 1.2 connections only.
  cipherSuites:
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  sniStrict: true
