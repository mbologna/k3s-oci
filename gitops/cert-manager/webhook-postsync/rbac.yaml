---
# RBAC for the PostSync hook that patches cert-manager webhook failurePolicy to Ignore.
# Needs cluster-level access to patch ValidatingWebhookConfiguration and
# MutatingWebhookConfiguration (cert-manager-webhook creates both).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager-webhook-patcher
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
# trivy:ignore:KSV-0114 - patch on webhook configs is required by design:
# this PostSync hook must set failurePolicy=Ignore after each Helm sync.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-webhook-patcher
  annotations:
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [admissionregistration.k8s.io]
    resources: [validatingwebhookconfigurations, mutatingwebhookconfigurations]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-webhook-patcher
  annotations:
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-webhook-patcher
subjects:
  - kind: ServiceAccount
    name: cert-manager-webhook-patcher
    namespace: cert-manager
