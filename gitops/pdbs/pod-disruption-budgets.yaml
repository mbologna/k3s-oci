  namespace: argocd
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
---
# PodDisruptionBudget for cert-manager
