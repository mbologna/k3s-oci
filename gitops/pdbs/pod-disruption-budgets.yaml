---
# PodDisruptionBudget for ArgoCD server
# maxUnavailable: 1 allows kured to drain nodes without deadlocking on single-replica pods.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argocd-server
  namespace: argocd
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
---
# PodDisruptionBudget for ArgoCD repo-server
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
---
# PodDisruptionBudget for ArgoCD application-controller
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
---
# PodDisruptionBudget for cert-manager
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
