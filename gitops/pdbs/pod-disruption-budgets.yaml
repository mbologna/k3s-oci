---
# PodDisruptionBudget for ArgoCD server
# maxUnavailable: 1 allows kured to drain nodes without deadlocking on single-replica pods.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argocd-server
  namespace: argocd
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
---
# PodDisruptionBudget for ArgoCD repo-server
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
