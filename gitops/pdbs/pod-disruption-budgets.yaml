  namespace: argocd
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
---
# PodDisruptionBudget for ArgoCD application-controller
apiVersion: policy/v1
