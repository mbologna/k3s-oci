      app.kubernetes.io/instance: cert-manager
---
# PodDisruptionBudget for Grafana
# Grafana runs as a single replica. Without a PDB, kured can evict it immediately
# during a node drain, causing a brief Grafana outage on every node reboot.
# maxUnavailable: 1 lets the eviction proceed but records the intent.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grafana
  namespace: monitoring
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
---
# PodDisruptionBudget for Alertmanager
# Alertmanager StatefulSet, single replica. PDB prevents simultaneous disruption
# alongside other components during rolling node reboots.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
---
# PodDisruptionBudget for kube-state-metrics
# kube-state-metrics is a single-replica Deployment providing cluster-level metrics.
# A PDB prevents it from being evicted at the same time as other monitoring components.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
---
# PodDisruptionBudget for Longhorn manager
# longhorn-manager runs as a DaemonSet. minAvailable: 2 limits voluntary evictions
# to 1 pod at a time for kubectl drain or system-upgrade-controller.
# NOTE: kured uses --ignore-daemonsets, so it drains nodes without consulting this PDB.
# This PDB protects against concurrent kubectl drain / SUC drains, NOT kured reboots.
# Kured's one-at-a-time reboot guarantee comes from its own distributed lock.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: longhorn-manager
  namespace: longhorn-system
spec:
  minAvailable: 2
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app: longhorn-manager
