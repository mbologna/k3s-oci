# Longhorn UI HTTPRoute with BasicAuth via Envoy Gateway SecurityPolicy
#
# To enable: set longhorn_hostname = "longhorn.example.com" in terraform.tfvars
# cloud-init will create this manifest automatically (with a generated password).
# The password is available via: terraform output -raw longhorn_ui_credentials
#
# If you prefer to manage it via GitOps instead, fill in the hostname below,
# generate the htpasswd hash with: openssl passwd -apr1 'your-password'
# and update the .htpasswd entry in the Secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-basic-auth-secret
  namespace: longhorn-system
type: Opaque
stringData:
  # htpasswd format: user:apr1-hashed-password
  # Generate with: openssl passwd -apr1 'your-password'
  .htpasswd: "admin:$apr1$replaceme$replaceme"
---
# SecurityPolicy attaches BasicAuth enforcement to the Longhorn HTTPRoute.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: longhorn-basic-auth
  namespace: longhorn-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: longhorn-frontend
  basicAuth:
    users:
      name: longhorn-basic-auth-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-frontend
  namespace: longhorn-system
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      # TODO: replace https-longhorn with your actual HTTPS listener name
      sectionName: https-longhorn
  hostnames:
    # TODO: replace with your actual hostname
    - "longhorn.example.com"
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: longhorn-frontend-tls
  # TLS secret lives in the Gateway namespace so no ReferenceGrant is needed.
  namespace: envoy-gateway-system
spec:
  secretName: longhorn-frontend-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    # TODO: replace with your actual hostname
    - longhorn.example.com
