---
# Longhorn taint-toleration Setting — configures Longhorn system components
# (CSI plugin DaemonSet, instance managers, engine images) to tolerate custom
# NoSchedule taints on specific nodes.
#
# NOTE: This module does NOT taint any nodes by default. Cloud-init actively
# REMOVES the control-plane NoSchedule taints added by k3s so that user workloads
# schedule across all 4 nodes. No variable like worker_node_taints exists.
#
# This file is an OPTIONAL template — only apply it if you manually taint a node
# (e.g. kubectl taint nodes <node> key=value:NoSchedule) and need Longhorn
# components to still schedule there.
#
# Format: key=value:Effect (or key:Effect for empty-value taints).
# Separate multiple tolerations with semicolons.
#
# Note: longhornManager toleration is set via Helm values at deploy time
# (the manager must start before it can read this Setting). This Setting
# only affects components managed by the running longhorn-manager.
#
# To enable: uncomment below, replace the taint key/effect to match your taint
# (check with: kubectl get nodes -o json | jq '.items[].spec.taints')
#
# See: https://longhorn.io/docs/latest/advanced-resources/deploy/taint-toleration/

# apiVersion: longhorn.io/v1beta2
# kind: Setting
# metadata:
#   name: taint-toleration
#   namespace: longhorn-system
# value: "node-role.kubernetes.io/agent:NoSchedule"
