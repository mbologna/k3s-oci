# External Secrets Operator — ClusterSecretStore template
#
# Cloud-init bootstraps the ClusterSecretStore with the correct vault OCID and region.
# To adopt it into ArgoCD management:
#   1. Fill in your vault OCID and OCI region below
#   2. Copy this file to gitops/apps/external-secrets-store.yaml (as an ArgoCD Application)
#      OR include it in an ArgoCD app pointing to this directory
#   3. Commit and push — ArgoCD will adopt the existing ClusterSecretStore
#
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: oci-vault
spec:
  provider:
    oracle:
      # TODO: replace with your vault OCID (from: terraform output vault_id)
      vault: "ocid1.vault.oc1.REGION.XXXXX"
      # TODO: replace with your OCI region (e.g. eu-frankfurt-1)
      region: "REGION"
      auth:
        # instance_principal uses the node's OCI dynamic group + IAM policy.
        # No credentials to manage — works automatically on cluster nodes.
        instancePrincipal: {}
