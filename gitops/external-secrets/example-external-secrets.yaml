# External Secrets — usage examples
#
# These ExternalSecret resources show how to sync OCI Vault secrets into
# Kubernetes Secrets using the 'oci-vault' ClusterSecretStore (created by cloud-init
# when enable_external_secrets = true).
#
# Usage: copy and adapt into your own ArgoCD Application or namespace.
# The OCI Vault secret names follow the pattern: <cluster_name>-<key>
# Check your secret names with: oci vault secret list --compartment-id <ocid>
#
---
# Example: re-sync the Grafana admin password from OCI Vault into the monitoring namespace.
# This is useful if you rotate the secret in Vault and want Kubernetes to pick it up
# without re-running cloud-init.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Merge  # Merge so cloud-init's admin-user key is preserved
  data:
    - secretKey: admin-password
      remoteRef:
        # Secret name in OCI Vault — matches the name Terraform sets in vault.tf
        key: "{{ cluster_name }}-grafana-admin-password"
---
# Example: pull an arbitrary application secret from OCI Vault.
# Create the Vault secret with: oci vault secret create-base64 --secret-name my-app-db-password ...
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-app-db-password
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: my-app-db-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: "my-app-db-password"
