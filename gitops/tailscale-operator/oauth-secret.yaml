---
# ExternalSecret — syncs Tailscale OAuth client credentials from OCI Vault
# into the 'operator-oauth' Secret used by the Tailscale operator.
#
# Requires enable_vault = true and enable_external_secrets = true in terraform.tfvars.
# Terraform stores the credentials under:
#   <cluster_name>-tailscale-oauth-client-id
#   <cluster_name>-tailscale-oauth-client-secret
# Verify names with: terraform output tailscale_vault_secret_names
#
# TODO: replace "my-k3s" below with your cluster_name from terraform.tfvars.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: my-k3s-tailscale-oauth-client-id
    - secretKey: client_secret
      remoteRef:
        key: my-k3s-tailscale-oauth-client-secret
