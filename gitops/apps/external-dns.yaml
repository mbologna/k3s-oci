apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    # renovate: datasource=helm depName=external-dns registryUrl=https://kubernetes-sigs.github.io/external-dns
    targetRevision: "1.20.0"
    helm:
      valuesObject:
        provider:
          name: cloudflare
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-credentials
                key: apiToken
        # policy=sync means external-dns will also delete DNS records for removed resources.
        # Use policy=upsert-only to prevent deletions if you manage DNS records elsewhere.
        policy: sync
        # txtOwnerId scopes ownership so multiple clusters can share the same zone
        # without stepping on each other's records.
        # ⚠️  Must match var.cluster_name in terraform.tfvars. Update here when forking.
        txtOwnerId: k3s-cluster
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
