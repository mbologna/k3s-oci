apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # renovate: datasource=helm depName=kube-prometheus-stack registryUrl=https://prometheus-community.github.io/helm-charts
    targetRevision: "86.3.2"
    helm:
      valuesObject:
        # Minimal footprint for 4-node A1.Flex cluster (ARM64, 6 GB RAM per node)
        defaultRules:
          create: true
          rules:
            # k3s exposes embedded etcd metrics on :2381 (--etcd-expose-metrics).
            # EtcdInsufficientMembers / EtcdNoLeader / EtcdMembersDown are the
            # primary signals for split-brain and quorum loss — must be enabled.
            etcd: true
            kubeScheduler: false

        # Prometheus — small retention, low memory
        prometheus:
          prometheusSpec:
            # 3d retention (down from 7d): halves disk + memory pressure with
            # negligible operational loss on a 4-node home cluster.
            retention: 3d
            retentionSize: "4GB"
            # ARM64 (A1.Flex) startup is slower — relax liveness probe to avoid false restarts
            livenessProbeFailureThreshold: 30
            livenessProbeTimeout: 10
            resources:
              requests:
                memory: 512Mi
                cpu: 100m
              limits:
                memory: 1500Mi  # 1Gi OOMKilled on ARM64; 1500Mi stable with 3d retention
                cpu: 500m
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 5Gi  # halved from 10Gi to match 3d retention
            # Scrape k3s embedded etcd metrics (exposed on :2381 via --etcd-expose-metrics).
            # Uses kubernetes_sd_configs to dynamically discover control-plane node IPs,
            # so no static IP configuration is needed.
            additionalScrapeConfigs:
              - job_name: k3s-etcd
                scheme: http
                kubernetes_sd_configs:
                  - role: node
                relabel_configs:
                  # Only scrape control-plane nodes
                  - source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_control_plane]
                    action: keep
                    regex: "true"
                  # Replace port with 2381
                  - source_labels: [__address__]
                    regex: '(.+?)(?::\d+)?$'
                    replacement: '$1:2381'
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_node_name]
                    target_label: node
                metrics_path: /metrics

        # Grafana — minimal, no persistence (dashboards via ConfigMaps)
        grafana:
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
          persistence:
            enabled: false
          # Admin credentials are pre-created by cloud-init as 'grafana-admin-secret'.
          # Retrieve with: terraform output -raw grafana_admin_credentials
          admin:
            existingSecret: "grafana-admin-secret"
            userKey: "admin-user"
            passwordKey: "admin-password"
          grafana.ini:
            server:
              root_url: "%(protocol)s://%(domain)s/"

        # Alertmanager — minimal
        alertmanager:
          alertmanagerSpec:
            configSecret: alertmanager-oci-config
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: 128Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 1Gi

        # kube-state-metrics
        kube-state-metrics:
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi

        # node-exporter
        prometheus-node-exporter:
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for CRDs with large annotations
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
