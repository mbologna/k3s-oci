apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # renovate: datasource=helm depName=kube-prometheus-stack registryUrl=https://prometheus-community.github.io/helm-charts
    targetRevision: "84.3.0"
    helm:
      valuesObject:
        # Minimal footprint for 4-node A1.Flex cluster (ARM64, 6 GB RAM per node)
        defaultRules:
          create: true
          rules:
            etcd: false        # k3s embeds etcd; external scraping not needed
            kubeScheduler: false

        # Prometheus — small retention, low memory
        prometheus:
          prometheusSpec:
            retention: 7d
            retentionSize: "8GB"
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 512Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 10Gi

        # Grafana — minimal, no persistence (dashboards via ConfigMaps)
        grafana:
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
          persistence:
            enabled: false
          # Admin credentials are pre-created by cloud-init as 'grafana-admin-secret'.
          # Retrieve with: terraform output -raw grafana_admin_credentials
          admin:
            existingSecret: "grafana-admin-secret"
            userKey: "admin-user"
            passwordKey: "admin-password"
          grafana.ini:
            server:
              root_url: "%(protocol)s://%(domain)s/"

        # Alertmanager — minimal
        alertmanager:
          alertmanagerSpec:
            configSecret: alertmanager-oci-config
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: 128Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 1Gi

        # kube-state-metrics
        kube-state-metrics:
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi

        # node-exporter
        prometheus-node-exporter:
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for CRDs with large annotations
