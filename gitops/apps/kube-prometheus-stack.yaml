apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # renovate: datasource=helm depName=kube-prometheus-stack registryUrl=https://prometheus-community.github.io/helm-charts
    targetRevision: "87.12.5"
    helm:
      valuesObject:
        # Minimal footprint for 4-node A1.Flex cluster (ARM64, 6 GB RAM per node)
        defaultRules:
          create: true
          rules:
            # k3s exposes embedded etcd metrics on :2381 (--etcd-expose-metrics).
            # EtcdInsufficientMembers / EtcdNoLeader / EtcdMembersDown are the
            # primary signals for split-brain and quorum loss — must be enabled.
            # The job name MUST remain 'k3s-etcd' (see additionalScrapeConfigs below)
            # to match the bundled etcd mixin selector: job=~".*etcd.*".
            etcd: true
            # k3s runs these components inside the k3s binary — they are not
            # separately addressable. Disable BOTH the ServiceMonitors (see below)
            # AND the default alert rule groups. Without both disabled, absent() on
            # a missing up{job="kube-controller-manager"} series evaluates to 1 and
            # KubeControllerManagerDown / KubeProxyDown fire permanently.
            kubeScheduler: false
            kubeControllerManager: false
            kubeProxy: false

        # Disable serviceMonitors for components that k3s does not expose as
        # separate processes (they run inside k3s itself and are not reachable
        # from pods). Leaving these enabled produces chronic KubeSchedulerDown /
        # KubeControllerManagerDown / KubeProxyDown false alerts and a collision
        # between the kubeEtcd ServiceMonitor and our custom k3s-etcd scrape job.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false

        # Prometheus — small retention, low memory
        prometheus:
          prometheusSpec:
            # 3d retention (down from 7d): halves disk + memory pressure with
            # negligible operational loss on a 4-node home cluster.
            retention: 3d
            retentionSize: "4GB"
            # ARM64 (A1.Flex) startup is slower — relax liveness probe to avoid false restarts
            livenessProbeFailureThreshold: 30
            livenessProbeTimeout: 10
            resources:
              requests:
                memory: 512Mi
                cpu: 100m
              limits:
                memory: 1500Mi  # 1Gi OOMKilled on ARM64; 1500Mi stable with 3d retention
                cpu: 500m
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 5Gi  # halved from 10Gi to match 3d retention
            # Scrape k3s embedded etcd metrics (exposed on :2381 via --etcd-expose-metrics).
            # Uses kubernetes_sd_configs to dynamically discover control-plane node IPs,
            # so no static IP configuration is needed.
            additionalScrapeConfigs:
              - job_name: k3s-etcd
                scheme: http
                kubernetes_sd_configs:
                  - role: node
                relabel_configs:
                  # Only scrape control-plane nodes
                  - source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_control_plane]
                    action: keep
                    regex: "true"
                  # Replace port with 2381
                  - source_labels: [__address__]
                    regex: '(.+?)(?::\d+)?$'
                    replacement: '$1:2381'
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_node_name]
                    target_label: node
                metrics_path: /metrics

        # Grafana — minimal, no persistence (dashboards via ConfigMaps)
        grafana:
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
          persistence:
            enabled: false
          # Admin credentials are pre-created by cloud-init as 'grafana-admin-secret'.
          # Retrieve with: terraform output -raw grafana_admin_credentials
          admin:
            existingSecret: "grafana-admin-secret"
            userKey: "admin-user"
            passwordKey: "admin-password"
          grafana.ini:
            server:
              # root_url uses %(domain)s which defaults to 'localhost' since domain is not
              # set here — the actual hostname (grafana.<nlb-ip>.sslip.io) is a runtime value
              # injected by configure_grafana_ingress() in k3s-argocd.sh at bootstrap time
              # and is not available as a static gitops value. This means Grafana-generated
              # absolute URLs (alert notification links, "share/copy link") embed localhost.
              # UI access, login, and all dashboards are fully functional — only generated
              # links are affected. To fix: set GF_SERVER_DOMAIN/GF_SERVER_ROOT_URL via a
              # cloud-init kubectl patch after configure_grafana_ingress() has the hostname.
              root_url: "%(protocol)s://%(domain)s/"

        # Alertmanager — minimal
        alertmanager:
          alertmanagerSpec:
            configSecret: alertmanager-oci-config
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: 128Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 1Gi

        # kube-state-metrics
        kube-state-metrics:
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi

        # prometheusOperator: pin admissionWebhooks.failurePolicy to Ignore.
        # k3s HA konnectivity returns 502 for webhook calls during leader transitions.
        # Ignore ensures PrometheusRule/ServiceMonitor applies succeed even if the
        # operator webhook is temporarily unreachable (consistent with cert-manager
        # and longhorn webhook handling). Without this explicit pin, the chart default
        # varies by version; pinning makes the intent clear.
        prometheusOperator:
          admissionWebhooks:
            failurePolicy: Ignore

        # node-exporter: enable textfile collector for custom metrics (e.g. etcd_snapshot_last_success_timestamp_seconds)
        prometheus-node-exporter:
          extraArgs:
            - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
          extraHostVolumeMounts:
            - name: textfile-collector
              hostPath: /var/lib/node_exporter/textfile_collector
              mountPath: /var/lib/node_exporter/textfile_collector
              readOnly: true
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for CRDs with large annotations
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
