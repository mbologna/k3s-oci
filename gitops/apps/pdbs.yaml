apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pod-disruption-budgets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mbologna/k3s-oci.git
    targetRevision: HEAD
    path: gitops/pdbs
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
