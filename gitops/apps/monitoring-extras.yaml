apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-extras
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mbologna/k3s-oci.git
    targetRevision: HEAD
    path: gitops/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true   # required for PrometheusRule CRDs
  ignoreDifferences:
    # Gateway API defaults group/kind on parentRefs at the server side.
    # These fields are not in the source manifests, causing false OutOfSync.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.rules[].matches
    # cloud-init patches the hostnames field on the Grafana HTTPRoute (NLB-IP-specific).
    # Ignore it so ArgoCD does not revert to the hostname-less gitops version.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: grafana
      namespace: monitoring
      jsonPointers:
        - /spec/hostnames
