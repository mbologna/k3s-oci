apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-extras
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mbologna/k3s-oci.git
    targetRevision: HEAD
    path: gitops/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true   # required for PrometheusRule CRDs
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Gateway API defaults group/kind on parentRefs at the server side.
    # These fields are not in the source manifests, causing false OutOfSync.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.rules[].matches
    # cloud-init uses SSA with field-manager=cloud-init-bootstrap to set spec.hostnames
    # on the Grafana HTTPRoute. ArgoCD's SSA (argocd-controller) applies without this
    # field, so it doesn't own or clear it. The ignoreDifferences below prevents ArgoCD
    # from showing OutOfSync when it detects the cloud-init-owned hostname field.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: grafana
      namespace: monitoring
      jsonPointers:
        - /spec/hostnames
