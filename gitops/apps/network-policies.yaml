apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mbologna/k3s-oci.git
    targetRevision: HEAD
    path: gitops/network-policies
  destination:
    server: https://kubernetes.default.svc
    # Manifests specify their own namespaces; this is a fallback for un-namespaced resources.
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CreateNamespace=true: optional feature namespaces (external-dns, external-secrets)
      # receive their NetworkPolicies even before the feature helm chart creates the namespace.
      # An empty namespace with NetworkPolicies is harmless until pods appear.
      - CreateNamespace=true
