apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    # Deploy before storage consumers (kube-prometheus-stack PVCs, alertmanager PVC).
    # Wave -1 ensures Longhorn converges and StorageClass is ready before wave 0 apps.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      # renovate: datasource=helm depName=longhorn registryUrl=https://charts.longhorn.io
      targetRevision: "1.12.0"
      helm:
        valuesObject:
          defaultSettings:
            # 2 replicas: tolerates 1-node loss with ~33% less write amplification than 3.
            # With 50 GB boot-only volumes (~30 GB usable after OS/images), 3 replicas
            # leaves only ~20-30 GB cluster-wide PVC capacity. 2 replicas recovers usable
            # storage while still surviving a single node failure.
            # Use the longhorn-replicated-3 StorageClass for explicitly critical PVCs.
            defaultReplicaCount: 2
            # Ensure Longhorn instance-managers are not evicted under memory pressure
            # ahead of lower-priority user workloads. An evicted instance-manager
            # during a replica rebuild risks data loss.
            priorityClass: system-cluster-critical
            # Block node drain if the drain would leave any volume with no healthy replica.
            # With defaultReplicaCount=2, a drain could momentarily leave a volume at 1
            # replica; this policy ensures the drain waits until Longhorn confirms safety.
            # Explicitly pinned to avoid relying on chart default changing between versions.
            nodeDrainPolicy: block-if-contains-last-replica
            # Wait 10 minutes before rebuilding a replica for a missing node. This prevents
            # thrashing on short maintenance windows or rolling upgrades: if the drained
            # node comes back within 10 min, no extra replica rebuild IO is triggered.
            replicaReplenishmentWaitInterval: "600"
          persistence:
            # Make longhorn the default StorageClass so PVCs without explicit
            # storageClassName are satisfied automatically.
            defaultClass: true
            defaultClassReplicaCount: 2
          # Disable pre-upgrade job: ArgoCD runs it on every sync (including
          # fresh installs) where longhorn-manager isn't running yet, causing
          # the job to fail and block the sync.
          preUpgradeChecker:
            jobEnabled: false
    # PostSync hook: sets webhook failurePolicy to Ignore after each Helm sync.
    # The Helm chart resets failurePolicy to Fail on every sync; the hook re-applies
    # the Ignore patch to prevent the konnectivity 502 issue from breaking startup.
    - repoURL: https://github.com/mbologna/k3s-oci.git
      targetRevision: HEAD
      path: gitops/longhorn/webhook-postsync
    # Extra StorageClass for explicitly critical PVCs requiring 3-replica protection.
    # Reference with storageClassName: longhorn-replicated-3 on high-value PVCs.
    - repoURL: https://github.com/mbologna/k3s-oci.git
      targetRevision: HEAD
      path: gitops/longhorn/storageclasses
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
  # konnectivity proxy (k3s HA EgressSelector) cannot route webhook calls to
  # pods — returns 502 — causing longhorn-manager to crash-loop at startup.
  # The PostSync hook re-applies failurePolicy:Ignore after each sync.
  # ignoreDifferences prevents ArgoCD from showing OutOfSync.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: longhorn-webhook-validator
      jqPathExpressions:
        - .webhooks[].failurePolicy
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: longhorn-webhook-mutator
      jqPathExpressions:
        - .webhooks[].failurePolicy
