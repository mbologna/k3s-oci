apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    # Wave 1: envoy-gateway must be Healthy before gateway-config (wave 2) syncs.
    # gateway-config creates GatewayClass/Gateway resources that require the
    # envoy-gateway CRDs and controller to be running.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/envoyproxy
    chart: gateway-helm
    # renovate: datasource=github-releases depName=envoyproxy/gateway
    targetRevision: "v1.8.1"
    helm:
      valuesObject:
        deployment:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
