apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kured
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubereboot.github.io/charts
    chart: kured
    # renovate: datasource=helm depName=kured registryUrl=https://kubereboot.github.io/charts
    targetRevision: "6.0.0"
    helm:
      valuesObject:
        configuration:
          rebootSentinelFile: /var/run/reboot-required
          # Maintenance window: 04:00–06:00 Europe/Rome (DST-safe; always local CET/CEST)
          # Starts after apt finishes (02:00+jitter) so kured reboots a fully-upgraded node.
          # Edit here to change the window; must match NLB maintenance expectations.
          startTime: "04:00"
          endTime: "06:00"
          timeZone: Europe/Rome
          rebootDays:
            - tue
            - wed
            - thu
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/etcd
            operator: Exists
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
