apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mbologna/k3s-oci.git
    targetRevision: HEAD
    path: gitops/gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      # Use Server-Side Apply so ArgoCD manages fields via SSA ownership instead of
      # the last-applied-configuration annotation. With SSA, ArgoCD owns only the
      # listeners it explicitly applies (the `http` listener from gateway.yaml).
      # cloud-init-bootstrap owns the `https-grafana` listener; ArgoCD's SSA apply
      # never touches it. ignoreDifferences below suppresses OutOfSync warnings.
      - ServerSideApply=true
  ignoreDifferences:
    # Gateway API defaults group/kind on parentRefs/backendRefs at server side.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.rules[].matches
    # cloud-init adds hostname-specific HTTPS listeners (e.g. https-grafana) to
    # the Gateway after ArgoCD deploys it. Ignore spec.listeners so ArgoCD does
    # not remove them on reconciliation.
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /spec/listeners
