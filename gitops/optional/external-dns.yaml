# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE TEMPLATE — DO NOT APPLY DIRECTLY
#
# This file documents the external-dns ArgoCD Application structure.
# When enable_external_dns = true in Terraform, cloud-init creates the
# Application inline via create_external_dns_app() in files/lib/k3s-argocd.sh,
# injecting runtime values that cannot be stored in a static YAML file:
#   - domainFilters   ← var.external_dns_domain_filter
#   - zoneIdFilters   ← var.cloudflare_zone_id
#   - txtOwnerId      ← var.cluster_name
#
# To update the chart version, edit the targetRevision below AND update
# chart_version in create_external_dns_app() in files/lib/k3s-argocd.sh.
# Renovate tracks the version in this file via the inline comment below.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    # renovate: datasource=helm depName=external-dns registryUrl=https://kubernetes-sigs.github.io/external-dns
    targetRevision: "1.21.1"
    helm:
      valuesObject:
        provider:
          name: cloudflare
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-credentials
                key: apiToken
        policy: sync
        # ⚠️  These values are injected at bootstrap time from Terraform variables.
        # See create_external_dns_app() in files/lib/k3s-argocd.sh.
        domainFilters:
          - "<var.external_dns_domain_filter>"
        zoneIdFilters:
          - "<var.cloudflare_zone_id>"
        txtOwnerId: "<var.cluster_name>"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
