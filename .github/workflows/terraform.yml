name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'files/**'
      - 'gitops/**'
      - '.github/workflows/**'
      - '.tflint.hcl'
      - '.terraform-docs.yml'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - 'files/**'
      - 'gitops/**'
      - '.github/workflows/**'
      - '.tflint.hcl'
      - '.terraform-docs.yml'
      - 'README.md'

jobs:
  validate:
    name: Terraform Validate & Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: terraform init example (no backend)
        working-directory: example
        run: terraform init -backend=false

      - name: terraform validate example
        working-directory: example
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          tflint_version: v0.56.0

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck scripts
        run: |
          shellcheck --severity=warning \
            files/k3s-install-server.sh \
            files/k3s-install-agent.sh

  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Update README with terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: .
          output-file: README.md
          output-method: inject
          config-file: .terraform-docs.yml
          git-push: true
          git-commit-message: "docs: auto-update README variables via terraform-docs [skip ci]"


  opentofu:
    name: OpenTofu Validate
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          # renovate: datasource=github-releases depName=opentofu/opentofu
          tofu_version: "1.9.1"

      - name: tofu fmt check
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate

      - name: tofu init example (no backend)
        working-directory: example
        run: tofu init -backend=false

      - name: tofu validate example
        working-directory: example
        run: tofu validate

  yamllint:
    name: YAML Lint (gitops)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint gitops
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            gitops/

  trivy:
    name: Trivy IaC Scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (Terraform + gitops)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: ".terraform,example/.terraform"
