name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'files/**'
      - '.github/workflows/**'
      - '.tflint.hcl'
      - '.terraform-docs.yml'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - 'files/**'
      - '.github/workflows/**'
      - '.tflint.hcl'
      - '.terraform-docs.yml'
      - 'README.md'

jobs:
  validate:
    name: Terraform Validate & Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: terraform init example (no backend)
        working-directory: example
        run: terraform init -backend=false

      - name: terraform validate example
        working-directory: example
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          tflint_version: v0.56.0

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck scripts
        run: |
          shellcheck --severity=warning \
            files/k3s-install-server.sh \
            files/k3s-install-agent.sh

  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update README with terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: .
          output-file: README.md
          output-method: inject
          config-file: .terraform-docs.yml
          git-push: true
          git-commit-message: "docs: auto-update README variables via terraform-docs [skip ci]"

