name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'files/**'
      - 'gitops/**'
      - '.github/workflows/**'
      - '.tflint.hcl'
      - '.terraform-docs.yml'
      - 'README.md'
      - 'renovate.json'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - 'files/**'
      - 'gitops/**'
      - '.github/workflows/**'
      - '.tflint.hcl'
      - '.terraform-docs.yml'
      - 'README.md'
      - 'renovate.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Terraform Validate & Lint
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~> 1.9"

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: terraform init example (no backend)
        working-directory: example
        run: terraform init -backend=false

      - name: terraform validate example
        working-directory: example
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
        with:
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          tflint_version: v0.56.0

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck scripts
        run: |
          shellcheck --severity=warning \
            files/k3s-install-server.sh \
            files/k3s-install-agent.sh

  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Update README with terraform-docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1
        with:
          working-dir: .
          output-file: README.md
          output-method: inject
          config-file: .terraform-docs.yml
          git-push: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
          fail-on-diff: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          git-commit-message: "docs: auto-update README variables via terraform-docs [skip ci]"


  opentofu:
    name: OpenTofu Validate
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          # renovate: datasource=github-releases depName=opentofu/opentofu
          tofu_version: "1.9.1"

      - name: tofu fmt check
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate

      - name: tofu init example (no backend)
        working-directory: example
        run: tofu init -backend=false

      - name: tofu validate example
        working-directory: example
        run: tofu validate

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            gitops/ .github/workflows/

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  trivy:
    name: Trivy IaC Scan
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Trivy (Terraform + gitops)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: ".terraform,example/.terraform"
