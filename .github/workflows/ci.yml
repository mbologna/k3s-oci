name: CI

"on":
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "files/**"
      - "gitops/**"
      - ".github/workflows/**"
      - ".tflint.hcl"
      - ".terraform-docs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "Justfile"
      - "renovate.json"
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "files/**"
      - "gitops/**"
      - ".github/workflows/**"
      - ".tflint.hcl"
      - ".terraform-docs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "Justfile"
      - "renovate.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  security-events: write

jobs:
  terraform:
    uses: mbologna/.github/.github/workflows/terraform-ci.yml@b84e24e2ad726629e7d50cd30cdaca387dcdc3a1 # main
    with:
      terraform_version: "~> 1.9"
      opentofu_version: "1.9.1"
      enable_terraform_docs: true
      enable_shellcheck: true
      shellcheck_files: >-
        files/lib/bootstrap-ubuntu.sh
        files/lib/bootstrap-opensuse.sh
        files/lib/common.sh
        files/lib/k3s-server.sh
        files/lib/k3s-bootstrap.sh
        files/lib/k3s-secrets.sh
        files/lib/k3s-cert-manager.sh
        files/lib/k3s-external-secrets.sh
        files/lib/k3s-argocd.sh
        files/lib/k3s-agent.sh
        scripts/clean-oci-resources.sh
        scripts/import-opensuse-aarch64.sh
        scripts/setup-longhorn-backup.sh
        gitops/update-repo-url.sh
        example/get-kubeconfig.sh
        example/ssh-node.sh
      example_dir: example
    secrets: inherit
